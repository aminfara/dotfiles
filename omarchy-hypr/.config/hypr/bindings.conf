# bind = SUPER, H, exec, voxtype record toggle                 # Dictation Button
# bind = SUPER, PERIOD, exec, omarchy-launch-walker -m symbols # Emoji Button

# macOS-style text navigation & window focus
# Unbind defaults that conflict (SUPER+arrows: movefocus, SUPER+SHIFT+arrows: swapwindow)
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN

# Ctrl+arrows = focus window (like macOS Ctrl+arrow for spaces/windows)
bindd = CTRL, LEFT,  Focus on left window,  movefocus, l
bindd = CTRL, RIGHT, Focus on right window, movefocus, r
bindd = CTRL, UP,    Focus on above window, movefocus, u
bindd = CTRL, DOWN,  Focus on below window, movefocus, d

# Ctrl+Shift+arrows = swap window (moved from SUPER+SHIFT+arrows)
bindd = CTRL SHIFT, LEFT,  Swap window to the left,   swapwindow, l
bindd = CTRL SHIFT, RIGHT, Swap window to the right,  swapwindow, r
bindd = CTRL SHIFT, UP,    Swap window up,            swapwindow, u
bindd = CTRL SHIFT, DOWN,  Swap window down,          swapwindow, d

# Cmd (SUPER)+arrows = Home/End (like macOS Cmd+arrow)
bindd = SUPER,       LEFT,  Move to line start,         sendshortcut, ,      HOME,
bindd = SUPER,       RIGHT, Move to line end,           sendshortcut, ,      END,
bindd = SUPER,       UP,    Move to document start,     sendshortcut, CTRL,  HOME,
bindd = SUPER,       DOWN,  Move to document end,       sendshortcut, CTRL,  END,
bindd = SUPER SHIFT, LEFT,  Select to line start,       sendshortcut, SHIFT, HOME,
bindd = SUPER SHIFT, RIGHT, Select to line end,         sendshortcut, SHIFT, END,
bindd = SUPER SHIFT, UP,    Select to document start,   sendshortcut, CTRL SHIFT, HOME,
bindd = SUPER SHIFT, DOWN,  Select to document end,     sendshortcut, CTRL SHIFT, END,

# Alt+arrows = jump/select word (like macOS Option+arrow)
bindd = ALT,       LEFT,  Jump word left,         sendshortcut, CTRL,       LEFT,
bindd = ALT,       RIGHT, Jump word right,        sendshortcut, CTRL,       RIGHT,
bindd = ALT SHIFT, LEFT,  Select word left,       sendshortcut, CTRL SHIFT, LEFT,
bindd = ALT SHIFT, RIGHT, Select word right,      sendshortcut, CTRL SHIFT, RIGHT,

# macOS Phase 2: in-app shortcuts (all unbound at WM level — no conflicts)

# Undo / Redo (Cmd+Z / Cmd+Shift+Z)
bindd = SUPER,       Z, Undo, sendshortcut, CTRL,       Z,
bindd = SUPER SHIFT, Z, Redo, sendshortcut, CTRL SHIFT, Z,

# Select all (Cmd+A)
bindd = SUPER, A, Select all, sendshortcut, CTRL, A,

# New window / file (Cmd+N)
bindd = SUPER, N, New window or file, sendshortcut, CTRL, N,

# Reload / Refresh (Cmd+R)
bindd = SUPER, R, Reload or refresh, sendshortcut, CTRL, R,

# Text formatting (Cmd+B / Cmd+I / Cmd+U)
bindd = SUPER, B, Bold,      sendshortcut, CTRL, B,
bindd = SUPER, I, Italic,    sendshortcut, CTRL, I,
bindd = SUPER, U, Underline, sendshortcut, CTRL, U,

# Find next (Cmd+G)
bindd = SUPER, G, Find next, sendshortcut, CTRL, G,

# Select word / bookmark (Cmd+D)
bindd = SUPER, D, Select word or bookmark, sendshortcut, CTRL, D,

# Quit app (Cmd+Q → Alt+F4, graceful quit with save prompt)
bindd = SUPER, Q, Quit app, sendshortcut, ALT, F4,

# Minimise to scratchpad (Cmd+M)
bindd = SUPER, M, Minimise to scratchpad, movetoworkspacesilent, special:scratchpad
