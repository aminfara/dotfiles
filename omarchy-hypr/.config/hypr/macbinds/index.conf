source = ~/.config/hypr/macbinds/01-movements.conf

# # macOS Phase 2: in-app shortcuts (all unbound at WM level — no conflicts)
#
# # Undo / Redo (Cmd+Z / Cmd+Shift+Z)
# bindd = SUPER,       Z, Undo, sendshortcut, CTRL,       Z,
# bindd = SUPER SHIFT, Z, Redo, sendshortcut, CTRL SHIFT, Z,
#
# # Select all (Cmd+A)
# bindd = SUPER, A, Select all, sendshortcut, CTRL, A,
#
# # New window / file (Cmd+N)
# bindd = SUPER, N, New window or file, sendshortcut, CTRL, N,
#
# # Reload / Refresh (Cmd+R)
# bindd = SUPER, R, Reload or refresh, sendshortcut, CTRL, R,
#
# # Text formatting (Cmd+B / Cmd+I / Cmd+U)
# bindd = SUPER, B, Bold,      sendshortcut, CTRL, B,
# bindd = SUPER, I, Italic,    sendshortcut, CTRL, I,
# bindd = SUPER, U, Underline, sendshortcut, CTRL, U,
#
# # Find next (Cmd+G)
# bindd = SUPER, G, Find next, sendshortcut, CTRL, G,
#
# # Select word / bookmark (Cmd+D)
# bindd = SUPER, D, Select word or bookmark, sendshortcut, CTRL, D,
#
# # Quit app (Cmd+Q → Alt+F4, graceful quit with save prompt)
# bindd = SUPER, Q, Quit app, sendshortcut, ALT, F4,
#
# # Minimise to scratchpad (Cmd+M)
# bindd = SUPER, M, Minimise to scratchpad, movetoworkspacesilent, special:scratchpad
#
# # macOS Phase 3: conflicting shortcuts — relocate WM actions, rebind for in-app use
#
# # ── Super+GRAVE: cycle windows of same app (macOS Cmd+`) ─────────────────
# bindd = SUPER,       GRAVE, Cycle app windows forward,  exec, python3 "${XDG_CONFIG_HOME:-$HOME/.config}/hypr/cycle_same_app.py" next
# bindd = SUPER SHIFT, GRAVE, Cycle app windows backward, exec, python3 "${XDG_CONFIG_HOME:-$HOME/.config}/hypr/cycle_same_app.py" prev
#
# # ── Super+S: save (scratchpad → Ctrl+Grave) ──────────────────────────────
# unbind = SUPER, S
# bindd = CTRL, GRAVE, Toggle scratchpad, togglespecialworkspace, scratchpad
# bindd = SUPER, S,       Save,    sendshortcut, CTRL,       S,
# bindd = SUPER SHIFT, S, Save as, sendshortcut, CTRL SHIFT, S,
#
# # ── Super+T: new tab (togglefloating → Ctrl+Shift+Space) ─────────────────
# unbind = SUPER, T
# bindd = CTRL SHIFT, SPACE, Toggle float/tile, togglefloating,
# bindd = SUPER, T, New tab (terminal), sendshortcut, CTRL SHIFT, T, ^(com.mitchellh.ghostty|Alacritty|foot|kitty|.*[Tt]erminal.*)$
# bindd = SUPER, T, New tab (apps),     sendshortcut, CTRL,       T,
#
# # ── Super+F: find (fullscreen → F11) ─────────────────────────────────────
# unbind = SUPER, F
# bindd = , F11, Full screen, fullscreen, 0
# bindd = SUPER, F, Find (terminal), sendshortcut, CTRL SHIFT, F, ^(com.mitchellh.ghostty|Alacritty|foot|kitty|.*[Tt]erminal.*)$
# bindd = SUPER, F, Find (apps),     sendshortcut, CTRL,       F,
#
# # ── Super+K: add link / palette (keybindings → Super+Ctrl+K) ─────────────
# unbind = SUPER, K
# bindd = SUPER CTRL, K, Show keybindings, exec, omarchy-menu-keybindings
# bindd = SUPER, K, Add link or command palette, sendshortcut, CTRL, K,
#
# # ── Super+,: app preferences (dismiss notification → Super+Ctrl+Alt+,) ───
# unbind = SUPER, COMMA
# bindd = SUPER CTRL ALT, COMMA, Dismiss last notification, exec, makoctl dismiss
# bindd = SUPER, COMMA, App preferences, sendshortcut, CTRL, COMMA,
#
# # ── Super+O: open file (pop window out → Super+Alt+O) ────────────────────
# unbind = SUPER, O
# bindd = SUPER ALT, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
# bindd = SUPER, O, Open file, sendshortcut, CTRL, O,
#
# # ── Super+P / Super+Shift+P: print / command palette ─────────────────────
# unbind = SUPER, P
# unbind = SUPER SHIFT, P
# bindd = SUPER CTRL, P, Pseudo tile, pseudo,
# bindd = SUPER,       P, Print or command palette,  sendshortcut, CTRL,       P,
# bindd = SUPER SHIFT, P, Command palette (explicit), sendshortcut, CTRL SHIFT, P,
#
# # ── Super+G: find next (togglegroup removed; rebinding from Phase 2) ──────
# unbind = SUPER, G
# bindd = SUPER, G, Find next, sendshortcut, CTRL, G,
#
# # ── Super+Shift+G: find prev (Signal moved to Walker) ────────────────────
# unbind = SUPER SHIFT, G
# bindd = SUPER SHIFT, G, Find previous, sendshortcut, CTRL SHIFT, G,
