# macOS-style text navigation & window focus
# Unbind defaults that conflict (SUPER+arrows: movefocus, SUPER+SHIFT+arrows: swapwindow)
unbind = CTRL, LEFT
unbind = CTRL, RIGHT
unbind = CTRL, UP
unbind = CTRL, DOWN
unbind = CTRL SHIFT, LEFT
unbind = CTRL SHIFT, RIGHT
unbind = CTRL SHIFT, UP
unbind = CTRL SHIFT, DOWN

unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN

unbind = ALT, LEFT
unbind = ALT, RIGHT
unbind = ALT SHIFT, LEFT
unbind = ALT SHIFT, RIGHT

# Ctrl+arrows = focus window (like macOS Ctrl+arrow for spaces/windows)
bindd = CTRL, LEFT,  Focus on left window,  movefocus, l
bindd = CTRL, RIGHT, Focus on right window, movefocus, r
bindd = CTRL, UP,    Focus on above window, movefocus, u
bindd = CTRL, DOWN,  Focus on below window, movefocus, d

# Ctrl+Shift+arrows = swap window (moved from SUPER+SHIFT+arrows)
bindd = CTRL SHIFT, LEFT,  Swap window to the left,   swapwindow, l
bindd = CTRL SHIFT, RIGHT, Swap window to the right,  swapwindow, r
bindd = CTRL SHIFT, UP,    Swap window up,            swapwindow, u
bindd = CTRL SHIFT, DOWN,  Swap window down,          swapwindow, d

# Cmd (SUPER)+arrows = Home/End (like macOS Cmd+arrow)
bindd = SUPER,       LEFT,  Move to line start,         sendshortcut, ,           HOME, activewindow
bindd = SUPER,       RIGHT, Move to line end,           sendshortcut, ,           END, activewindow
bindd = SUPER,       UP,    Move to document start,     sendshortcut, CTRL,       HOME, activewindow
bindd = SUPER,       DOWN,  Move to document end,       sendshortcut, CTRL,       END, activewindow
bindd = SUPER SHIFT, LEFT,  Select to line start,       sendshortcut, SHIFT,      HOME, activewindow
bindd = SUPER SHIFT, RIGHT, Select to line end,         sendshortcut, SHIFT,      END, activewindow
bindd = SUPER SHIFT, UP,    Select to document start,   sendshortcut, CTRL SHIFT, HOME, activewindow
bindd = SUPER SHIFT, DOWN,  Select to document end,     sendshortcut, CTRL SHIFT, END, activewindow

# Alt+arrows = jump/select word (like macOS Option+arrow)
bindd = ALT,       LEFT,  Jump word left,         sendshortcut, CTRL,       LEFT, activewindow
bindd = ALT,       RIGHT, Jump word right,        sendshortcut, CTRL,       RIGHT, activewindow
bindd = ALT SHIFT, LEFT,  Select word left,       sendshortcut, CTRL SHIFT, LEFT, activewindow
bindd = ALT SHIFT, RIGHT, Select word right,      sendshortcut, CTRL SHIFT, RIGHT, activewindow